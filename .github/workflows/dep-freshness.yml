name: Dependency Freshness
# Weekly: pull the LATEST versions of everything and run the full suite. If latest deps break SAM, open
# an issue so it's known BEFORE a user hits it. Doesn't commit anything — it's a canary, not an updater
# (Dependabot does the actual, reviewed bumps).
on:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC
  workflow_dispatch:
permissions:
  contents: read
jobs:
  latest-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 20, cache: npm }
      - name: Install LATEST of everything
        run: npm install --no-audit --no-fund
      - name: Full suite against latest
        run: npm run lint && npx tsc --noEmit && npm test && npm run build
      - name: Report a break on latest deps
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `📦 Latest dependencies break the build — ${new Date().toISOString().slice(0,10)}`;
            const body = `The weekly latest-deps canary failed: some dependency's newest version breaks SAM. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPin or fix before it reaches users via a Dependabot merge.`;
            const existing = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: "dep-canary" });
            if (existing.data.length === 0) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ["dep-canary", "dependencies"] });
            }
