name: CI
on:
  # Skip when only prose changed — typecheck/tests/build cannot be affected by a docs-only change.
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".mailmap"
      - "LICENSE"
  pull_request: { branches: [main] }
  # Lets the SAM Fix bot run the required checks on its own branch. A GITHUB_TOKEN push can't
  # trigger push/pull_request (anti-recursion), but workflow_dispatch is the documented exception,
  # so the bot dispatches this to get real CI (test + cross-platform) reporting on its PR.
  workflow_dispatch:
# Auto-cancel superseded runs on the same branch/PR — no wasted minutes on stale pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Lint gate — Biome. Fails the build on ERROR-level rules only (warnings are advisory and
      # don't block). Keeps the codebase born-clean without churning the intentional dense style.
      - run: npm run lint
      # The Warden — SAM's security-regression gate. Runs FIRST and by name so a guardrail regression
      # (SSRF/Handshake/Safe-at-rest/redaction/local→cloud/CORS/Host/denylist/pending) fails the build
      # unmistakably, not buried in the full suite. Deterministic, defensive — SAM tested against SAM.
      - name: The Warden — security gate
        run: npx vitest run server/warden.test.ts
      - run: npm test
      # Type-check — `vite build` uses esbuild which strips types WITHOUT checking them,
      # so type errors slip through the build. This catches them.
      - run: npx tsc --noEmit
      - run: npm run build

      # Truth check — advertised numbers must equal reality. Regenerate stats from the live
      # registries; fail if docs/stats.json or the README numbers drifted (someone changed the
      # tool/agent/skill/provider registry without running `npm run stats`).
      - name: Advertised stats are current (no drift)
        run: |
          npm run stats
          git diff --exit-code docs/stats.json docs/repo-description.txt README.md || {
            echo "::error::Advertised numbers are stale. Run 'npm run stats' and commit the result.";
            exit 1;
          }

      # Selftest — checks tools, agents, vault, and model availability.
      - name: Live Boot Selftest
        run: npm run selftest
        
      # Boot smoke test — catches runtime crashes that typecheck/build miss
      # (e.g. a bad ESM import that only fails when the server actually starts).
      - name: Boot smoke test
        run: |
          npx tsx server/index.ts &
          PID=$!
          for i in $(seq 1 25); do
            if curl -sf http://localhost:8787/api/health >/dev/null 2>&1; then
              echo "✓ SAM booted and answered /api/health"; kill $PID 2>/dev/null; exit 0
            fi
            sleep 1
          done
          echo "✗ SAM failed to boot within 25s"; kill $PID 2>/dev/null; exit 1

  # PHASE 4 — cross-platform proof: boot SAM + self-test + verify the platform matrix on all 3 OSes.
  # Proves the "universal tools" claim: SAM boots everywhere, the registry is intact, and every
  # macOS-only tool degrades cleanly (0 ungated-risk) — not just "it compiled on Linux".
  cross-platform:
    # Skip the heavy 3-OS matrix on DRAFT PRs (still runs on every push to main + ready PRs).
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Platform matrix current + zero ungated-risk
        run: npm run platforms          # exits 1 if any macOS-only tool lacks a clean degrade
      - name: Live boot self-test
        run: npm run selftest            # checks tools, agents, vault, model availability
      - name: Boot + smoke the API on ${{ matrix.os }}
        shell: bash
        run: |
          node dist/server.mjs > boot.log 2>&1 &
          PID=$!
          UP=0
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8787/api/health >/dev/null 2>&1; then UP=1; break; fi
            sleep 2
          done
          if [ "$UP" != "1" ]; then echo "❌ SAM did not boot on ${{ matrix.os }}"; tail -20 boot.log; kill $PID 2>/dev/null; exit 1; fi
          N=$(curl -s http://127.0.0.1:8787/api/tools | node -e "process.stdin.on('data',d=>{try{console.log(JSON.parse(d).length)}catch{console.log(0)}})")
          echo "✅ ${{ matrix.os }}: booted, /api/health OK, $N tools registered"
          [ "${N:-0}" -ge 100 ] || { echo "❌ too few tools ($N)"; exit 1; }
          kill $PID 2>/dev/null || true
