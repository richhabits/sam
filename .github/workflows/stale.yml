name: Stale
on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch:
permissions:
  contents: read
jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          # Kind wording — this is a hobby-friendly project; nudge gently, never scold.
          stale-issue-message: >
            Hey — this one's been quiet for a couple of months, so it's been marked stale to keep the
            tracker tidy. If it still matters to you, just drop a comment and it stays open. No rush. 🙂
          stale-pr-message: >
            This PR's been quiet for a while, so it's marked stale. Totally fine to pick it back up —
            a comment or a push keeps it open. Thanks for contributing to SAM! 🙏
          close-issue-message: >
            Closing this for now to keep things tidy — but it's not a "no". Comment any time and we'll
            happily reopen. 👋
          close-pr-message: >
            Closing for now to keep the queue clean. If you want to continue, reopen or ping us — no problem at all. 👋
          exempt-issue-labels: 'security,pinned,roadmap,good first issue'
          exempt-pr-labels: 'security,pinned,work-in-progress'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
