# ─────────────────────────────────────────────────────────────
#  Build SAM desktop apps — Mac (.dmg) + Windows (.exe installer)
#
#  Each platform builds on its OWN runner because the native module
#  (better-sqlite3) can't be cross-compiled — its .node must be built
#  on-platform, FROM SOURCE, against Electron's ABI (npmRebuild is off
#  in package.json, so we do that rebuild explicitly here).
#
#  Triggers:
#   • Publish a GitHub Release (or push a v* tag) → builds + attaches
#     the installers to that release (auto-update picks them up).
#   • Run manually (workflow_dispatch) → builds + uploads artifacts you
#     can download from the run, without touching a release.
#
#  Code signing is OPTIONAL — set these repo secrets to ship signed
#  (unsigned still builds fine, users just click through Gatekeeper):
#   Mac:  CSC_LINK (base64 .p12), CSC_KEY_PASSWORD, and for notarizing
#         APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#   Win:  WIN_CSC_LINK (base64 .pfx), WIN_CSC_KEY_PASSWORD
# ─────────────────────────────────────────────────────────────
name: Build Desktop Apps

on:
  release:
    types: [published]   # publish a release → build + attach installers to it
  workflow_dispatch:      # run manually → build + upload artifacts (or publish to a release)
    inputs:
      publish:
        description: "Attach installers to the release for this version (must already exist)"
        type: boolean
        default: false
# Serialise per release/ref, but NEVER cancel an in-flight release build (signing/notarization must finish).
concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # attach installers to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # Apple Silicon Macs
            platform: mac
            arch: arm64
          - os: macos-latest      # Intel Macs — CROSS-built on the (plentiful) arm64 runner, so we
            platform: mac          # never wait on the scarce macos-13 Intel runner.
            arch: x64
          - os: windows-latest     # Windows
            platform: win
            arch: x64
          - os: ubuntu-latest      # Linux (AppImage)
            platform: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gate the release on green tests + a clean type-check — never ship a red build.
      # (Run once, on the arm64 mac job, to avoid tripling CI time on identical unit tests.)
      - name: Test + type-check (release gate)
        if: matrix.platform == 'mac' && matrix.arch == 'arm64'
        run: |
          npm test
          npx tsc --noEmit

      - name: Build web + server bundles
        run: npm run build

      - name: Rebuild native modules for Electron (from source, target arch)
        run: npx @electron/rebuild --force --build-from-source --only better-sqlite3 --arch ${{ matrix.arch }}

      # Signs + notarizes AUTOMATICALLY when the Apple secrets are present, otherwise builds unsigned.
      # No workflow edits needed — add the repo secrets (CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID,
      # APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID) and the very next release signs itself.
      - name: Package + publish (${{ matrix.platform }} ${{ matrix.arch }})
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGN_CSC_LINK: ${{ secrets.CSC_LINK }}
          SIGN_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_SIGN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_SIGN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          PUBLISH=${{ (github.event_name == 'release' || inputs.publish) && 'always' || 'never' }}
          if [ "${{ matrix.platform }}" = "mac" ] && [ -n "$SIGN_CSC_LINK" ]; then
            export CSC_LINK="$SIGN_CSC_LINK" CSC_KEY_PASSWORD="$SIGN_CSC_KEY_PASSWORD"
            echo "🔏 macOS: signing + notarizing (Developer ID cert + notarization creds present)"
          elif [ "${{ matrix.platform }}" = "win" ] && [ -n "$WIN_SIGN_CSC_LINK" ]; then
            export CSC_LINK="$WIN_SIGN_CSC_LINK" CSC_KEY_PASSWORD="$WIN_SIGN_CSC_KEY_PASSWORD"
            echo "🔏 Windows: signing"
          else
            # No cert secret → force-disable auto-discovery so an empty CSC_LINK can't crash the build.
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "ℹ️ ${{ matrix.platform }}: unsigned build (no signing secrets set)"
          fi
          npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish "$PUBLISH"

      # RUNTIME PROOF (no false claims): actually launch the packaged app on THIS platform and
      # confirm the embedded server boots + responds. This exercises the real risks — the native
      # better-sqlite3 binding loading per-platform + the writable data dir — not just "it compiled".
      # Only smoke-test where the RUNNER arch matches the BUILD arch, so the app runs natively and
      # the result is honest. The mac-x64 build is cross-compiled on an arm64 runner — running it
      # here would only exercise Rosetta (Chromium's network service crashes under emulation), which
      # is NOT how a real Intel Mac behaves. Intel is build-verified; true runtime proof needs Intel HW.
      # Smoke only where the runner arch matches natively: win-x64 + mac-arm64. mac-x64 (cross-built,
      # Rosetta) and linux-AppImage (needs a display server) are build-verified; the install-test job
      # covers their runtime.
      - name: Smoke test — boot the packaged app + hit the server
        if: ${{ matrix.platform == 'win' || (matrix.platform == 'mac' && matrix.arch == 'arm64') }}
        shell: bash
        run: |
          set +e
          if [ "${{ matrix.platform }}" = "mac" ]; then
            APP=$(find dist-app -path '*SAM.app/Contents/MacOS/*' -type f | head -1)
          else
            APP=$(find dist-app -iname 'SAM.exe' -path '*unpacked*' | head -1)
          fi
          echo "Launching: $APP"
          if [ -z "$APP" ]; then echo "❌ could not locate the packaged binary under dist-app:"; find dist-app -maxdepth 2 -type d; exit 1; fi
          "$APP" > smoke.log 2>&1 &
          UP=0
          for i in $(seq 1 30); do
            if curl -s -m3 http://127.0.0.1:8787/api/status -o /dev/null; then UP=1; break; fi
            sleep 3
          done
          echo "----- app boot log -----"; tail -25 smoke.log 2>/dev/null
          taskkill //F //IM SAM.exe >/dev/null 2>&1; pkill -f 'SAM' >/dev/null 2>&1; true
          if [ "$UP" = "1" ]; then
            echo "✅ ${{ matrix.platform }}-${{ matrix.arch }}: packaged app booted and the server responded."
          else
            echo "❌ ${{ matrix.platform }}-${{ matrix.arch }}: server did NOT respond — see log above."; exit 1
          fi

      # PHASE 5 — prove notarization actually STUCK when signing is configured. If the Apple secrets are
      # present but Gatekeeper/stapler reject the build, fail the release loudly (a silently-broken
      # notarization is worse than an honest unsigned build). When unsigned, this skips cleanly.
      - name: Verify signature + notarization (macOS)
        if: matrix.platform == 'mac'   # both arches — spctl/stapler don't run the app, so x64 verifies fine too
        shell: bash
        env:
          HAVE_CERT: ${{ secrets.CSC_LINK != '' }}
        run: |
          APP=$(find dist-app -maxdepth 4 -name 'SAM.app' | head -1)
          DMG=$(find dist-app -maxdepth 1 -name '*.dmg' | head -1)
          if [ "$HAVE_CERT" != "true" ]; then echo "ℹ️ unsigned build (no CSC_LINK secret) — notarization check skipped, checksum-verify path stands."; exit 0; fi
          # HARD GATE: the app must be notarized (Gatekeeper's real requirement — clean open for any
          # online user, which is every install-time scenario). A silently-broken notarization fails loudly.
          echo "🔎 Gatekeeper assessment:"; spctl -a -vv --type exec "$APP" 2>&1 | tee /tmp/spctl.txt || true
          grep -qiE "source=Notarized Developer ID|accepted" /tmp/spctl.txt || { echo "❌ Gatekeeper did NOT accept the app — notarization didn't stick."; exit 1; }
          # SOFT CHECK: electron-builder notarizes+staples the .app but not the .dmg WRAPPER (the dmg
          # itself is never submitted to notary). The app is notarized, so it opens clean online; a
          # stapled dmg only helps FULLY-OFFLINE first-open. Warn, don't fail. (True dmg staple = v1.5.x.)
          echo "🔎 Stapler validate (dmg):"; if xcrun stapler validate "$DMG"; then echo "✅ dmg stapled — clean even offline."; else echo "⚠️ dmg not stapled (app IS notarized → clean online; offline-open staple is a follow-up)."; fi
          echo "✅ signed + notarized (app) — ships with zero Gatekeeper warning."

      - name: Upload installers as artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sam-${{ matrix.platform }}-${{ matrix.arch }}   # unique per platform+arch
          path: |
            dist-app/*.dmg
            dist-app/*.exe
            dist-app/*.blockmap
            dist-app/latest*.yml
          if-no-files-found: warn

  # After all platforms build + publish, compute SHA-256 of every installer and append a
  # "Verify your download" section to the release notes. Idempotent (skips if already present).
  checksums:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: SHA-256 checksums → release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -e
          gh release view "$TAG" -R "$REPO" --json body -q .body > existing.md
          if grep -q "Verify your download" existing.md; then
            echo "checksums already in notes — skipping"; exit 0
          fi
          mkdir dl && cd dl
          gh release download "$TAG" -R "$REPO" -p '*.dmg' -p '*.exe' -p '*.AppImage'
          # SHA256SUMS.txt — uploaded as a release asset so install.sh / install.ps1 can verify downloads.
          sha256sum * > SHA256SUMS.txt
          gh release upload "$TAG" -R "$REPO" SHA256SUMS.txt --clobber
          {
            echo "## 🔒 Verify your download (SHA-256)"
            echo ""
            echo "The one-paste installers verify this automatically. To check by hand, compute the hash and match:"
            echo "- **macOS/Linux:** \`shasum -a 256 <file>\`"
            echo "- **Windows (PowerShell):** \`Get-FileHash <file> -Algorithm SHA256\`"
            echo ""
            echo '```'
            cat SHA256SUMS.txt
            echo '```'
          } > sums.md
          cd ..
          { cat existing.md; echo ""; echo "---"; echo ""; cat dl/sums.md; } > combined.md
          gh release edit "$TAG" -R "$REPO" --notes-file combined.md
          echo "✓ checksums (notes + SHA256SUMS.txt asset) published for $TAG"
          # Homebrew cask — auto-bump the tap so `brew install --cask richhabits/tap/sam` tracks releases.
          # Runs only if HOMEBREW_TAP_TOKEN (a PAT with write to richhabits/homebrew-tap) is set — else skips.
          if [ -n "${HOMEBREW_TAP_TOKEN:-}" ]; then
            V="${TAG#v}"
            ARM=$(grep -iE "arm64\.dmg" dl/SHA256SUMS.txt | grep -oiE '[a-f0-9]{64}' | head -1)
            INTEL=$(grep -iE "SAM-${V}\.dmg" dl/SHA256SUMS.txt | grep -oiE '[a-f0-9]{64}' | head -1)
            cat > sam.rb <<CASK
          cask "sam" do
            version "${V}"
            on_arm do
              sha256 "${ARM}"
              url "https://github.com/${REPO}/releases/download/v#{version}/SAM-#{version}-arm64.dmg"
            end
            on_intel do
              sha256 "${INTEL}"
              url "https://github.com/${REPO}/releases/download/v#{version}/SAM-#{version}.dmg"
            end
            name "SAM"
            desc "Free, private, local-first AI assistant that actually does the work"
            homepage "https://github.com/${REPO}"
            app "SAM.app"
          end
          CASK
            git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/richhabits/homebrew-tap.git" tap 2>/dev/null && {
              mkdir -p tap/Casks; cp sam.rb tap/Casks/sam.rb
              cd tap && git config user.name "sam-bot" && git config user.email "sam@hectic" \
                && git add Casks/sam.rb && git commit -m "sam ${V}" && git push && echo "✓ Homebrew cask bumped to ${V}"
            } || echo "⚠ tap push skipped (repo/token issue)"
          else
            echo "ℹ️ Homebrew tap auto-bump skipped (HOMEBREW_TAP_TOKEN not set)"
          fi

  # PHASE 1 — clean-machine install test: run the ACTUAL one-paste installers from scratch on fresh
  # macOS/Windows/Ubuntu runners against the just-published release. Install must succeed on all three
  # or the release is marked failed. (SAM_NO_LAUNCH=1 → install silently, don't open the GUI.)
  install-test:
    needs: checksums
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      SAM_NO_LAUNCH: "1"
      # Authenticate install.sh's GitHub API call — hosted macOS runners share an egress IP that's
      # chronically rate-limited (403) for UNauthenticated api.github.com. Real users need no token.
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: One-paste install (${{ matrix.os }})
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            pwsh -ExecutionPolicy Bypass -File docs/install.ps1
          else
            bash docs/install.sh
          fi
      - name: Verify SAM landed
        shell: bash
        run: |
          case "${{ runner.os }}" in
            macOS)   test -d "/Applications/SAM.app" && echo "✅ SAM.app installed on macOS";;
            Linux)   test -x "$HOME/.local/bin/SAM.AppImage" && echo "✅ AppImage installed on Linux";;
            Windows) if ls "$LOCALAPPDATA/Programs" 2>/dev/null | grep -qi sam; then echo "✅ SAM installed on Windows (LOCALAPPDATA/Programs)"; else echo "❌ not found"; ls "$LOCALAPPDATA/Programs" 2>/dev/null; exit 1; fi;;
          esac
