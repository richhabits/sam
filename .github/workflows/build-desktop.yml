# ─────────────────────────────────────────────────────────────
#  Build SAM desktop apps — Mac (.dmg) + Windows (.exe installer)
#
#  Each platform builds on its OWN runner because the native module
#  (better-sqlite3) can't be cross-compiled — its .node must be built
#  on-platform, FROM SOURCE, against Electron's ABI (npmRebuild is off
#  in package.json, so we do that rebuild explicitly here).
#
#  Triggers:
#   • Publish a GitHub Release (or push a v* tag) → builds + attaches
#     the installers to that release (auto-update picks them up).
#   • Run manually (workflow_dispatch) → builds + uploads artifacts you
#     can download from the run, without touching a release.
#
#  Code signing is OPTIONAL — set these repo secrets to ship signed
#  (unsigned still builds fine, users just click through Gatekeeper):
#   Mac:  CSC_LINK (base64 .p12), CSC_KEY_PASSWORD, and for notarizing
#         APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#   Win:  WIN_CSC_LINK (base64 .pfx), WIN_CSC_KEY_PASSWORD
# ─────────────────────────────────────────────────────────────
name: Build Desktop Apps

on:
  release:
    types: [published]   # publish a release → build + attach installers to it
  workflow_dispatch:      # run manually → build + upload artifacts (or publish to a release)
    inputs:
      publish:
        description: "Attach installers to the release for this version (must already exist)"
        type: boolean
        default: false

permissions:
  contents: write   # attach installers to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # Apple Silicon Macs
            platform: mac
            arch: arm64
          - os: macos-latest      # Intel Macs — CROSS-built on the (plentiful) arm64 runner, so we
            platform: mac          # never wait on the scarce macos-13 Intel runner.
            arch: x64
          - os: windows-latest     # Windows
            platform: win
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web + server bundles
        run: npm run build

      - name: Rebuild native modules for Electron (from source, target arch)
        run: npx @electron/rebuild --force --build-from-source --only better-sqlite3 --arch ${{ matrix.arch }}

      - name: Package + publish (${{ matrix.platform }} ${{ matrix.arch }})
        run: >
          npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }}
          --publish ${{ (github.event_name == 'release' || inputs.publish) && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build UNSIGNED by default. An empty CSC_LINK makes electron-builder try to read the cwd
          # as a certificate ("not a file" crash on macOS), so we explicitly disable signing here.
          # ── To ship SIGNED builds: add these repo secrets, DELETE the line below, and uncomment:
          #   Mac:  CSC_LINK: ${{ secrets.CSC_LINK }}
          #         CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          #         APPLE_ID: ${{ secrets.APPLE_ID }}
          #         APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          #         APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          #   Win:  WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          #         WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers as artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sam-${{ matrix.platform }}-${{ matrix.arch }}   # unique per platform+arch
          path: |
            dist-app/*.dmg
            dist-app/*.exe
            dist-app/*.blockmap
            dist-app/latest*.yml
          if-no-files-found: warn
