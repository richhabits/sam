name: CodeQL
# Security scan runs WEEKLY (+ on demand) — not on every push/PR. CodeQL is a heavy
# job; on a private repo, running it per-push burns Actions minutes fast. Weekly is
# plenty for a solo repo; trigger a scan any time from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
