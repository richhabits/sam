name: SAM Fix

# Label an issue `sam-fix` and SAM attempts a fix on its own free brain, PROVES it with the full
# test suite, and opens a DRAFT PR only if everything passes. A failed attempt just comments what it
# tried — nothing broken can reach main. Free: free Actions minutes + free Groq tier. See
# scripts/sam-fix.mjs for the safety model.
on:
  issues:
    types: [labeled]

concurrency:
  group: sam-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: github.event.label.name == 'sam-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write         # push the fix branch
      pull-requests: write     # open the draft PR
      issues: write            # comment the outcome
    steps:
      # Push/open the PR as SAM_BOT_PAT when it's set, so the branch push fires a REAL pull_request
      # CI run that branch protection actually counts — then the PR merges on green with a normal
      # click. Falls back to GITHUB_TOKEN if no PAT: still opens the PR, but its checks won't count
      # toward the gate (a GITHUB_TOKEN push can't trigger CI), so that one needs an admin merge.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.SAM_BOT_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci

      - name: Attempt a fix on SAM's free brain
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/sam-fix.mjs

      - name: Open a draft PR, or comment why not
        env:
          # PAT for push + PR create (so a real pull_request CI run fires and counts toward the gate).
          GH_TOKEN: ${{ secrets.SAM_BOT_PAT || secrets.GITHUB_TOKEN }}
          # Built-in token for the issue comments — it has issues:write, so the PAT needs only
          # Contents + Pull requests, nothing more.
          COMMENT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          N: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          STATUS=$(jq -r .status fix-result.json)
          echo "result: $(cat fix-result.json)"

          if [ "$STATUS" = "applied" ]; then
            SUMMARY=$(jq -r .summary fix-result.json)
            BRANCH="sam-fix/issue-${N}"
            git config user.name "sam-bot"
            git config user.email "sam-bot@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git commit -am "SAM: ${SUMMARY} (for #${N})

          Auto-generated by SAM on its own free Groq brain, then verified with the full
          test suite (typecheck + tests + build). Draft — a human reviews before merge."
            git push -u origin "$BRANCH" --force-with-lease
            gh pr create -R "$REPO" --base main --head "$BRANCH" \
              --title "SAM fix: ${SUMMARY} (closes #${N})" \
              --body "SAM attempted this on its own free brain and \`npm run verify\` passed (typecheck + tests + build). **Please review before merging.** Closes #${N}."
            GH_TOKEN="$COMMENT_TOKEN" gh issue comment "$N" -R "$REPO" --body "🤖 I took a shot at this on my free brain and the full test suite passed — opened a PR for review. Once CI is green, merge it (or close it if it's off). If it's off, just close it."
          elif [ "$STATUS" = "fail" ]; then
            REASON=$(jq -r .reason fix-result.json)
            TAIL=$(jq -r '.verifyTail // ""' fix-result.json)
            git checkout -- . || true
            BODY="🤖 I tried this on my free brain but backed off: ${REASON}"
            if [ -n "$TAIL" ]; then BODY="${BODY}

          <details><summary>what the tests said</summary>

          \`\`\`
          ${TAIL}
          \`\`\`
          </details>"; fi
            GH_TOKEN="$COMMENT_TOKEN" gh issue comment "$N" -R "$REPO" --body "$BODY"
          else
            REASON=$(jq -r '.reason // "skipped"' fix-result.json)
            echo "Skipping: $REASON"
            GH_TOKEN="$COMMENT_TOKEN" gh issue comment "$N" -R "$REPO" --body "🤖 I looked at this on my free brain but didn't attempt a fix: ${REASON}"
          fi
