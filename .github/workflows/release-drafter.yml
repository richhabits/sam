name: Release Drafter
# Manual-only: it no longer drafts on every push to main (that kept re-creating a v2.x.x draft
# release nobody asked for). Run it by hand from the Actions tab when you're actually cutting a
# release and want the notes assembled. (Still never on PRs: the config must live on the default
# branch, so a PR introducing it would fail the lookup — a false red.)
on:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: release-drafter-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update_release_draft:
    permissions:
      contents: write      # create/update the draft release
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
