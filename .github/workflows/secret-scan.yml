name: Secret scan
# RULE 2: no real API key may ever appear in the repo, installers, builds, or docs.
# gitleaks scans the full tree + history and FAILS the build if any secret pattern is found.
on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # scan full history, not just the tip
      - name: Run gitleaks (OSS binary — no license needed)
        run: |
          VER=8.21.2
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${VER}"
          # AUDIT FIX: pipe-to-tar ran an UNVERIFIED binary. Download the tarball AND the
          # release's published checksums, verify the tarball against them, and only then
          # extract + run. A corrupted or swapped binary now fails the job instead of executing.
          curl -sSfL "$BASE/gitleaks_${VER}_linux_x64.tar.gz" -o gitleaks.tar.gz
          curl -sSfL "$BASE/gitleaks_${VER}_checksums.txt" -o gitleaks_checksums.txt
          grep "gitleaks_${VER}_linux_x64.tar.gz" gitleaks_checksums.txt | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          echo "Scanning working tree…"
          ./gitleaks detect --source . --config .gitleaks.toml --no-banner --redact --exit-code 1
          echo "✅ No secrets found in the repo."
