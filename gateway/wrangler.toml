name = "sam-gateway"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Anonymous per-device + global quota counters (daily TTL). Create with:
#   npx wrangler kv namespace create QUOTA
# then paste the id below.
[[kv_namespaces]]
binding = "QUOTA"
id = "REPLACE_WITH_KV_ID"

# Non-secret config. Secrets (PROVIDER_KEYS) are set separately — never in this file.
# ── CONSERVATIVE SOFT-BETA values (tighten first, loosen once cost is understood) ──
[vars]
UPSTREAM_URL = "https://api.groq.com/openai/v1"          # any OpenAI-compatible base
MODEL_WHITELIST = "llama-3.1-8b-instant,gemma2-9b-it"    # cheap models only
PER_DEVICE_DAILY = "15"                                  # small per-device allowance (device id is client-supplied; PER_IP is the real backstop)
PER_IP_DAILY = "200"                                     # per-source-IP daily cap — bounds an actor who rotates device ids
GLOBAL_DAILY = "3000"                                    # conservative global/day
SPEND_CEILING_CALLS = "60000"                            # call-count ceiling; input is also bounded by MAX_INPUT_CHARS
MAX_INPUT_CHARS = "24000"                                # reject oversized prompts (~6k tokens) so call caps bound token cost
PAUSED = "0"                                             # set "1" to instantly pause the whole gateway
ALLOW_ORIGIN = "*"                                       # CORS only — NOT auth (any non-browser client ignores it); the IP cap is the control

# ── OPTIONAL: TRUE ATOMIC CAPS via a Durable Object (audit finding 1) ──
# Without a DO the caps use KV get-then-put (not atomic) — a concurrent burst can race them; the
# per-IP cap bounds the blast radius, which is fine for the free plan. To make the caps EXACT
# (check-and-reserve serialised through one actor, refund on failure), bind the QuotaCounter DO
# below. This requires a Workers PAID plan — a deliberate operator upgrade. When bound, the Worker
# uses it automatically; when absent, it falls back to the KV path. Uncomment to enable:
#
# [[durable_objects.bindings]]
# name = "QUOTA_DO"
# class_name = "QuotaCounter"
#
# [[migrations]]
# tag = "v1"
# new_classes = ["QuotaCounter"]

# Set the pooled keys as a SECRET (never committed):
#   npx wrangler secret put PROVIDER_KEYS      # paste: key1,key2,key3
